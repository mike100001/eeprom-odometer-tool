name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Inject password hash
        run: |
          HASH=$(echo -n "${{ secrets.APP_PASSWORD }}" | sha256sum | awk '{print $1}')
          sed -i "s/PLACEHOLDER_HASH/$HASH/" wwwroot/appsettings.json

      - name: Publish
        run: dotnet publish -c Release -o release

      - name: Show publish output
        run: find release -type f | sort

      - name: Fix base href for GitHub Pages
        run: |
          FILE=$(find release -name "index.html" | head -1)
          echo "Patching $FILE"
          sed -i 's|<base href="/" />|<base href="/eeprom-odometer-tool/" />|' "$FILE"
          grep "base href" "$FILE"

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Add 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
