name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Inject password hash
        run: |
          HASH=$(echo -n "${{ secrets.APP_PASSWORD }}" | sha256sum | awk '{print $1}')
          sed -i "s/PLACEHOLDER_HASH/$HASH/" wwwroot/appsettings.json

      - name: Fix base href for GitHub Pages
        run: sed -i 's|<base href="/" />|<base href="/eeprom-odometer-tool/" />|' wwwroot/index.html

      - name: Publish
        run: dotnet publish -c Release -o release

      - name: Add .nojekyll
        run: touch release/wwwroot/.nojekyll

      - name: Add 404.html for SPA routing
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages
