        window.downloadFile = (filename, bytes) => {
            const blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        };
